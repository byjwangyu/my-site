name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/mysite"
          strip_components: 1

      - name: Print URLs
        run: |
          echo "🔗 Navigation: http://${{ secrets.VPS_HOST }}/nav.html"
          for f in dist/*.html; do
            name=$(basename "$f")
            echo "🔗 http://${{ secrets.VPS_HOST }}/${name}"
          done